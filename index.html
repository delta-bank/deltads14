<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRT Sim Racing App</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e2748;
            --accent-color: #00d4ff;
            --card-bg: #2a345e;
            --text-color: #ffffff;
            --nav-bg: #151b33;
        }

        body {
            margin: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            padding-bottom: 90px; overflow-x: hidden;
        }

        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--accent-color); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 2px; margin: 0; color: var(--accent-color); }

        .page { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Griglie Categorie */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .cat-card {
            background: var(--card-bg); height: 90px; display: flex; align-items: center;
            justify-content: center; border-radius: 12px; font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .cat-card:active { background: var(--accent-color); transform: scale(0.95); }

        /* Card Pilota con Foto */
        .pilot-card {
            background: var(--card-bg); border-radius: 12px; padding: 12px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            border-left: 4px solid var(--accent-color);
        }
        .pilot-photo {
            width: 60px; height: 60px; border-radius: 50%;
            background: #444; object-fit: cover; border: 2px solid var(--accent-color);
        }
        .pilot-info { flex: 1; }
        .pilot-name { font-family: 'Orbitron', sans-serif; font-size: 1rem; margin-bottom: 4px; display: block; }
        .pilot-stats-row { display: flex; gap: 10px; font-size: 0.75rem; color: #ccc; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--accent-color); }

        /* Tabelle */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        th, td { padding: 12px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--accent-color); }
        .rank-num { font-family: 'Orbitron'; color: var(--accent-color); width: 20px; }

        .back-btn {
            background: none; border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 8px 12px; border-radius: 5px; margin-bottom: 15px; font-family: 'Orbitron'; font-size: 0.7rem;
        }

        /* Nav Bar a 3 tasti */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .nav-item { background: none; border: none; color: #666; font-size: 0.65rem; font-weight: bold; font-family: 'Orbitron'; }
        .nav-item.active-btn { color: var(--accent-color); }
        .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header><h1>VRT SIM RACING</h1></header>

    <div id="home" class="page active">
        <h2 style="font-size: 0.9rem; text-align: center; font-family: 'Orbitron';">LINEUP PILOTI</h2>
        <div class="category-grid">
            <div class="cat-card" onclick="showCategory('F1')">F1</div>
            <div class="cat-card" onclick="showCategory('F2')">F2</div>
            <div class="cat-card" onclick="showCategory('F3')">F3</div>
            <div class="cat-card" onclick="showCategory('F4')">F4</div>
        </div>
    </div>

    <div id="rank-menu" class="page">
        <h2 style="font-size: 0.9rem; text-align: center; font-family: 'Orbitron';">CLASSIFICHE</h2>
        <div class="category-grid">
            <div class="cat-card" onclick="showRank('F1')">F1 RANK</div>
            <div class="cat-card" onclick="showRank('F2')">F2 RANK</div>
            <div class="cat-card" onclick="showRank('F3')">F3 RANK</div>
            <div class="cat-card" onclick="showRank('F4')">F4 RANK</div>
        </div>
    </div>

    <div id="lastrace-menu" class="page">
        <h2 style="font-size: 0.9rem; text-align: center; font-family: 'Orbitron';">ULTIMA GARA</h2>
        <div class="category-grid">
            <div class="cat-card" style="border-color: #27ae60;" onclick="showLastRace('F1')">F1 L.R.</div>
            <div class="cat-card" style="border-color: #27ae60;" onclick="showLastRace('F2')">F2 L.R.</div>
            <div class="cat-card" style="border-color: #27ae60;" onclick="showLastRace('F3')">F3 L.R.</div>
            <div class="cat-card" style="border-color: #27ae60;" onclick="showLastRace('F4')">F4 L.R.</div>
        </div>
    </div>

    <div id="pilot-detail" class="page">
        <button class="back-btn" onclick="openPage('home')">← INDIETRO</button>
        <div id="piloti-container"></div>
    </div>

    <div id="rank-detail" class="page">
        <button class="back-btn" onclick="openPage('rank-menu')">← INDIETRO</button>
        <h2 id="rank-title" style="font-family: 'Orbitron'; font-size: 1rem;"></h2>
        <table id="table-piloti"></table>
        <table id="table-team" style="margin-top: 20px;"></table>
    </div>

    <div id="lastrace-detail" class="page">
        <button class="back-btn" onclick="openPage('lastrace-menu')">← INDIETRO</button>
        <h2 id="lr-title" style="font-family: 'Orbitron'; font-size: 1rem;"></h2>
        <table id="table-lastrace"></table>
    </div>

    <nav>
        <button class="nav-item active-btn" onclick="openPage('home', this)">
            <span class="nav-icon">🏠</span>HOME
        </button>
        <button class="nav-item" onclick="openPage('rank-menu', this)">
            <span class="nav-icon">📊</span>RANK
        </button>
        <button class="nav-item" onclick="openPage('lastrace-menu', this)">
            <span class="nav-icon">🏁</span>LAST RACE
        </button>
    </nav>

    <script>
        const teamData = {
            'F1': {
                piloti: [
                    { nome: 'M. Rossi', img: 'https://via.placeholder.com/100', partenze: 45, podi: 12, vittorie: 5 },
                    { nome: 'L. Bianchi', img: 'https://via.placeholder.com/100', partenze: 42, podi: 8, vittorie: 3 }
                ],
                rankPiloti: [{pos: 1, nome: 'M. Rossi', pt: 150}, {pos: 2, nome: 'L. Bianchi', pt: 130}],
                rankTeam: [{pos: 1, nome: 'VRT Racing', pt: 280}],
                lastRace: [{pos: 1, nome: 'M. Rossi', pt: 25}, {pos: 4, nome: 'L. Bianchi', pt: 12}]
            },
            'F2': {
                piloti: [
                    { nome: 'A. Neri', img: 'https://via.placeholder.com/100', partenze: 20, podi: 5, vittorie: 2 },
                    { nome: 'M. Viola', img: 'https://via.placeholder.com/100', partenze: 18, podi: 3, vittorie: 1 }
                ],
                rankPiloti: [{pos: 1, nome: 'A. Neri', pt: 90}],
                rankTeam: [{pos: 2, nome: 'VRT Academy', pt: 140}],
                lastRace: [{pos: 2, nome: 'A. Neri', pt: 18}, {pos: 6, nome: 'M. Viola', pt: 8}]
            }
            // F3 e F4 si aggiungono allo stesso modo...
        };

        function showCategory(cat) {
            const container = document.getElementById('piloti-container');
            container.innerHTML = `<h2 style="font-family:'Orbitron'; font-size:1rem; color:var(--accent-color)">TEAM ${cat}</h2>`;
            teamData[cat].piloti.forEach(p => {
                container.innerHTML += `
                    <div class="pilot-card">
                        <img src="${p.img}" class="pilot-photo" alt="${p.nome}">
                        <div class="pilot-info">
                            <span class="pilot-name">${p.nome}</span>
                            <div class="pilot-stats-row">
                                <div class="stat-box"><span class="stat-label">Starts</span><strong>${p.partenze}</strong></div>
                                <div class="stat-box"><span class="stat-label">Podiums</span><strong>${p.podi}</strong></div>
                                <div class="stat-box"><span class="stat-label">Wins</span><strong>${p.vittorie}</strong></div>
                            </div>
                        </div>
                    </div>`;
            });
            openPage('pilot-detail');
        }

        function showRank(cat) {
            document.getElementById('rank-title').innerText = 'RANK ' + cat;
            document.getElementById('table-piloti').innerHTML = `<tr><th>POS</th><th>PILOTA</th><th>PT</th></tr>` + 
                teamData[cat].rankPiloti.map(r => `<tr><td class="rank-num">${r.pos}</td><td>${r.nome}</td><td>${r.pt}</td></tr>`).join('');
            document.getElementById('table-team').innerHTML = `<tr><th>POS</th><th>COSTRUTTORI</th><th>PT</th></tr>` + 
                teamData[cat].rankTeam.map(r => `<tr><td class="rank-num">${r.pos}</td><td>${r.nome}</td><td>${r.pt}</td></tr>`).join('');
            openPage('rank-detail');
        }

        function showLastRace(cat) {
            document.getElementById('lr-title').innerText = 'LAST RACE ' + cat;
            document.getElementById('table-lastrace').innerHTML = `<tr><th>POS</th><th>PILOTA</th><th>PT GARA</th></tr>` + 
                teamData[cat].lastRace.map(r => `<tr><td class="rank-num">${r.pos}</td><td>${r.nome}</td><td>${r.pt}</td></tr>`).join('');
            openPage('lastrace-detail');
        }

        function openPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-btn'));
                btn.classList.add('active-btn');
            }
        }
    </script>
</body>
</html>
