<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPS BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card-color: #1e2748;
            --accent: #00f2ff;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* LOGO SOPRA IL SALDO */
        .brand-header {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-logo {
            max-width: 180px;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        /* SALDO */
        .balance-section {
            padding: 20px;
            text-align: center;
        }
        .label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 46px; font-weight: 700; margin-top: 5px; }

        .main { flex: 1; padding: 0 25px; display: flex; flex-direction: column; align-items: center; }

        /* --- LOGICA CARTA 3D --- */
        
        /* Contenitore principale per la prospettiva 3D */
        .card-container {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1.58 / 1;
            perspective: 1000px; /* Crea l'effetto 3D */
            z-index: 10;
        }

        /* L'elemento che ruota effettivamente */
        .card-flipper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d; /* Mantiene gli elementi interni in 3D */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* Animazione fluida */
            cursor: pointer;
        }

        /* Classe aggiunta da JS per far girare la carta */
        .card-flipper.is-flipped {
            transform: rotateY(180deg);
        }

        /* Stile comune per le due facce (fronte e retro) */
        .card-face {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden; /* Nasconde la faccia posteriore quando è girata */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* --- STILE FRONTE --- */
        .card-front {
            background-color: var(--card-color);
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent);
            z-index: 2; /* Il fronte è sopra inizialmente */
        }

        /* Logo centrale (filigrana) */
        .card-center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        /* Chip */
        .card-chip {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 48px;
            height: 35px;
            background: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 51%, #fbdf93 100%);
            border-radius: 6px;
            z-index: 2;
        }

        /* Mastercard */
        .mastercard-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 45px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        /* Numero Carta */
        .card-number { 
            position: absolute;
            top: 55%;
            left: 25px;
            font-size: 20px; 
            letter-spacing: 3px; 
            color: #fff; 
            font-family: 'Courier New', monospace;
            z-index: 2;
        }
        
        /* Nome e Data */
        .card-bottom-info {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 2;
        }
        
        .card-name-txt { 
            font-size: 13px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: #ffffff;
            font-weight: 500;
        }

        .expiry-txt {
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
        }

        /* --- STILE RETRO --- */
        .card-back {
            background-color: #0d1226; /* Un blu ancora più scuro */
            transform: rotateY(180deg); /* Ruotato di 180 gradi inizialmente */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Immagine del retro (banda magnetica, CVV, ecc.) */
        .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* TASTI AZIONE */
        .actions { display: flex; gap: 40px; margin-top: 40px; }
        .btn-container { text-align: center; cursor: pointer; color: inherit; width: 100px; }
        .btn-disabled { opacity: 0.3; cursor: default; }

        .circle-icon {
            width: 60px; height: 60px; border-radius: 20px;
            background: #111; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 10px; transition: 0.2s;
            margin: 0 auto 10px;
        }
        .accent-color { color: var(--accent); border-color: rgba(0, 242, 255, 0.2); }

        /* Tasto Reverse attivo */
        .btn-reverse { color: var(--accent); border-color: rgba(0, 242, 255, 0.2); }

        /* NAV bar */
        .nav-bar {
            margin-top: auto;
            background: #080808;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid #111;
        }
        .nav-link { color: #444; text-decoration: none; font-size: 22px; }
        .active-link { color: var(--accent); }

    </style>
</head>
<body>

    <div class="brand-header">
        <img src="iltuologo.png" alt="Logo" class="custom-logo">
    </div>

    <div class="balance-section">
        <p class="label">Current Balance</p>
        <h1 class="balance">€ 1.250,00</h1>
    </div>

    <main class="main">
        <div class="card-container" id="cardContainer">
            <div class="card-flipper" id="cardFlipper">
                
                <div class="card-face card-front">
                    <img src="iltuologo.png" class="card-center-logo">

                    <div class="card-chip"></div>

                    <i class="fa-brands fa-cc-mastercard mastercard-icon"></i>

                    <div class="card-number">•••• •••• •••• 1055</div>

                    <div class="card-bottom-info">
                        <p class="card-name-txt">Leonardo Soru</p>
                        <p class="expiry-txt">06/50</p>
                    </div>
                </div>

                <div class="card-face card-back">
                    <img src="il_tuo_retro.png" alt="Card Back" class="card-back-image">
                </div>

            </div>
        </div>

        <div class="actions">
            <div class="btn-container" onclick="location.reload()">
                <div class="circle-icon accent-color"><i class="fa-solid fa-arrows-rotate"></i></div>
                <p class="label" style="font-size: 11px;">Boost</p>
            </div>
            
            <div class="btn-container btn-reverse" id="reverseBtn">
                <div class="circle-icon"><i class="fa-solid fa-rotate"></i></div>
                <p class="label" style="font-size: 11px;">Reverse</p>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <a href="#" class="nav-link active-link"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-chart-pie"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script>
        const cardFlipper = document.getElementById('cardFlipper');
        const reverseBtn = document.getElementById('reverseBtn');

        // Funzione per girare la carta
        function flipCard() {
            cardFlipper.classList.toggle('is-flipped');
        }

        // Assegna la funzione al click sul tasto Reverse
        reverseBtn.addEventListener('click', flipCard);
        
        // Opzionale: gira la carta anche cliccandoci sopra direttamente
        // cardFlipper.addEventListener('click', flipCard);
    </script>

</body>
</html>
