<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scuderia Sim Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e2748;
            --accent-color: #00d4ff;
            --card-bg: #2a345e;
            --text-color: #ffffff;
            --nav-bg: #151b33;
            --f1-color: #e10600; /* Rosso F1 */
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Griglia Categorie Home */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .cat-card {
            background: var(--card-bg);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .cat-card:active { transform: scale(0.95); background: var(--accent-color); }

        /* Piloti */
        .pilot-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #151b33 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-color);
        }

        .pilot-name { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin-bottom: 5px; }
        .pilot-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: #aaa; }
        .stat-val { color: var(--accent-color); font-weight: bold; display: block; font-size: 1rem; }

        .back-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Nav Bar */
        nav {
            position: fixed;
            bottom: 0; width: 100%; height: 70px;
            background: var(--nav-bg);
            display: flex; justify-content: space-around; align-items: center;
        }

        .nav-item { background: none; border: none; color: #666; font-size: 0.7rem; }
        .nav-item.active-btn { color: var(--accent-color); }
        .nav-icon { font-size: 1.4rem; display: block; }
    </style>
</head>
<body>

    <header>
        <h1>VIRTUAL RACING TEAM</h1>
    </header>

    <div id="home" class="page active">
        <h2 style="text-align: center; font-size: 1rem; color: var(--accent-color);">SELEZIONA CATEGORIA</h2>
        <div class="category-grid">
            <div class="cat-card" onclick="showCategory('F1')">F1</div>
            <div class="cat-card" onclick="showCategory('F2')">F2</div>
            <div class="cat-card" onclick="showCategory('F3')">F3</div>
            <div class="cat-card" onclick="showCategory('F4')">F4</div>
        </div>
    </div>

    <div id="categoria-detail" class="page">
        <button class="back-btn" onclick="openPage('home')">← Indietro</button>
        <h2 id="cat-title" style="font-family: 'Orbitron';">CATEGORIA</h2>
        <div id="piloti-container">
            </div>
    </div>

    <div id="classifica" class="page">
        <h2 style="font-family: 'Orbitron';">RANKING TEAM</h2>
        <div class="pilot-card" style="padding: 10px;">
            <p>1. Mario Rossi (F1) - 150 pt</p>
            <hr style="opacity: 0.1;">
            <p>2. Luigi Bianchi (F1) - 140 pt</p>
            <hr style="opacity: 0.1;">
            <p>3. Alessandro Neri (F2) - 120 pt</p>
        </div>
    </div>

    <nav>
        <button class="nav-item active-btn" onclick="openPage('home', this)">
            <span class="nav-icon">🏠</span>HOME
        </button>
        <button class="nav-item" onclick="openPage('classifica', this)">
            <span class="nav-icon">📊</span>RANK
        </button>
    </nav>

    <script>
        // Database piloti (Modifica questi dati per aggiornare il sito)
        const teamData = {
            'F1': [
                { nome: 'Mario Rossi', vittorie: 5, podi: 12, irating: '4500' },
                { nome: 'Luigi Bianchi', vittorie: 3, podi: 8, irating: '4100' }
            ],
            'F2': [
                { nome: 'Alessandro Neri', vittorie: 2, podi: 5, irating: '3200' },
                { nome: 'Marco Viola', vittorie: 1, podi: 4, irating: '3000' }
            ],
            'F3': [
                { nome: 'Davide Gialli', vittorie: 0, podi: 2, irating: '2500' },
                { nome: 'Luca Verdi', vittorie: 1, podi: 1, irating: '2400' }
            ],
            'F4': [
                { nome: 'Pietro Arancio', vittorie: 0, podi: 0, irating: '1800' },
                { nome: 'Enrico Blu', vittorie: 0, podi: 1, irating: '1750' }
            ]
        };

        function showCategory(cat) {
            const container = document.getElementById('piloti-container');
            document.getElementById('cat-title').innerText = 'TEAM ' + cat;
            container.innerHTML = ''; // Pulisce i piloti precedenti

            teamData[cat].forEach(pilota => {
                container.innerHTML += `
                    <div class="pilot-card">
                        <div class="pilot-name">${pilota.nome}</div>
                        <div class="pilot-stats">
                            <div>VITTORIE <span class="stat-val">${pilota.vittorie}</span></div>
                            <div>PODI <span class="stat-val">${pilota.podi}</span></div>
                            <div>iRATING <span class="stat-val">${pilota.irating}</span></div>
                        </div>
                    </div>
                `;
            });

            openPage('categoria-detail');
        }

        function openPage(pageId, btn) {
            // Nasconde tutte le pagine
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));
            
            // Mostra la pagina richiesta
            document.getElementById(pageId).classList.add('active');

            // Gestione estetica bottoni nav
            if(btn) {
                const navBtns = document.querySelectorAll('.nav-item');
                navBtns.forEach(b => b.classList.remove('active-btn'));
                btn.classList.add('active-btn');
            }
        }
    </script>
</body>
</html>
